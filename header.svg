<svg fill="none" viewBox="0 0 1200 400" width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;family=Space+Grotesk:wght@500;700&amp;display=swap');

        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        /* Core Industrial Canvas */
        .wrapper {
          width: 1200px;
          height: 400px;
          background-color: #EBEBE6; /* Stark poster-paper off-white */
          background-image: 
            linear-gradient(90deg, #D4D4CE 1px, transparent 1px),
            linear-gradient(180deg, #D4D4CE 1px, transparent 1px);
          background-size: 40px 40px;
          background-position: -1px -1px;
          position: relative;
          font-family: 'Inter', sans-serif;
          color: #111111;
          overflow: hidden;
          border: 4px solid #111111;
        }

        /* Industrial Registration Marks (Crosshairs) */
        .mark {
          position: absolute;
          width: 24px;
          height: 24px;
          z-index: 20;
        }
        .m-tl { top: 16px; left: 16px; border-top: 3px solid #111; border-left: 3px solid #111; }
        .m-tr { top: 16px; right: 16px; border-top: 3px solid #111; border-right: 3px solid #111; }
        .m-bl { bottom: 16px; left: 16px; border-bottom: 3px solid #111; border-left: 3px solid #111; }
        .m-br { bottom: 16px; right: 16px; border-bottom: 3px solid #111; border-right: 3px solid #111; }

        /* Layout Grid */
        .content-grid {
          position: absolute;
          top: 40px;
          left: 60px;
          width: calc(100% - 120px);
          height: calc(100% - 80px);
          display: flex;
          justify-content: space-between;
          z-index: 10;
        }

        .col-main {
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          width: 65%;
        }

        .col-art {
          width: 30%;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          align-items: flex-end;
          position: relative;
        }

        /* Typography &amp; Header */
        .header-block {
          margin-top: 10px;
        }

        .bauhaus-red-block {
          width: 80px;
          height: 16px;
          background-color: #E32636;
          margin-bottom: 24px;
        }

        h1 {
          font-family: 'Inter', sans-serif;
          font-size: 92px;
          font-weight: 900;
          line-height: 0.85;
          letter-spacing: -4px;
          text-transform: uppercase;
          color: #111111;
          margin: 0 0 24px 0;
        }

        /* Subtitle / Roles */
        .roles-container {
          display: flex;
          align-items: center;
          background-color: #111111;
          padding: 12px 20px;
          width: fit-content;
        }

        .role {
          font-family: 'Space Grotesk', sans-serif;
          font-size: 16px;
          font-weight: 700;
          color: #EBEBE6;
          letter-spacing: 2px;
        }

        .separator {
          color: #E32636;
          font-size: 10px;
          margin: 0 16px;
        }

        /* Strict List / Tags */
        .manifest-list {
          display: flex;
          flex-direction: column;
          gap: 0;
          margin-bottom: 10px;
          width: 85%;
        }

        .manifest-item {
          display: flex;
          align-items: center;
          padding: 12px 0;
          border-bottom: 2px solid #111111;
          font-size: 15px;
          font-weight: 700;
          letter-spacing: 1.5px;
          text-transform: uppercase;
        }

        .manifest-item:first-child {
          border-top: 2px solid #111111;
        }

        .item-num {
          font-family: 'Space Grotesk', monospace;
          color: #E32636;
          font-weight: 700;
          font-size: 14px;
          width: 40px;
        }

        /* Bauhaus Abstract Geometry */
        .geometry-container {
          position: absolute;
          top: -20px;
          right: -20px;
          width: 320px;
          height: 320px;
          z-index: 1;
        }

        .geo-circle {
          position: absolute;
          top: 20px;
          right: 20px;
          width: 200px;
          height: 200px;
          background-color: #E32636; /* Classic Red */
          border-radius: 50%;
          mix-blend-mode: multiply;
        }

        .geo-square {
          position: absolute;
          bottom: 20px;
          left: 20px;
          width: 160px;
          height: 160px;
          background-color: #F2C94C; /* Classic Yellow */
          mix-blend-mode: multiply;
        }

        .geo-lines {
          position: absolute;
          top: 80px;
          left: -40px;
          width: 240px;
          height: 180px;
          background-image: repeating-linear-gradient(
            -45deg,
            transparent,
            transparent 12px,
            #2D9CDB 12px, /* Classic Blue */
            #2D9CDB 16px
          );
          mix-blend-mode: multiply;
        }

        /* Industrial Barcode &amp; Status */
        .sys-container {
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          margin-top: auto;
          margin-bottom: 10px;
          z-index: 10;
        }

        .barcode {
          display: flex;
          height: 48px;
          margin-bottom: 12px;
        }

        .bar { background: #111111; height: 100%; margin-left: 4px; }
        .b1 { width: 6px; } .b2 { width: 14px; } .b3 { width: 4px; }
        .b4 { width: 10px; } .b5 { width: 24px; } .b6 { width: 8px; }
        .b7 { width: 4px; } .b8 { width: 18px; } .b9 { width: 6px; }

        .sys-data {
          font-family: 'Space Grotesk', monospace;
          font-size: 11px;
          color: #111111;
          text-align: right;
          font-weight: 700;
          letter-spacing: 1px;
          line-height: 1.6;
        }

        @keyframes mechanical-blink {
          0%, 49% { opacity: 1; }
          50%, 100% { opacity: 0; }
        }

        .status-dot {
          display: inline-block;
          width: 10px;
          height: 10px;
          background-color: #E32636;
          border-radius: 50%;
          margin-right: 8px;
          animation: mechanical-blink 2s infinite linear;
        }
      </style>

      <div class="wrapper">
        <div class="mark m-tl"></div>
        <div class="mark m-tr"></div>
        <div class="mark m-bl"></div>
        <div class="mark m-br"></div>

        <div class="content-grid">
          
          <div class="col-main">
            <div class="header-block">
              <div class="bauhaus-red-block"></div>
              <h1>ISMAIL<br/>AZZOUZ</h1>
              
              <div class="roles-container">
                <span class="role">SOFTWARE ENGINEER</span>
                <span class="separator">■</span>
                <span class="role">CYBERSEC</span>
                <span class="separator">■</span>
                <span class="role">SIMRACER</span>
              </div>
            </div>

            <div class="manifest-list">
              <div class="manifest-item">
                <span class="item-num">01</span>
                <span>BUILDING AT SCALE</span>
              </div>
              <div class="manifest-item">
                <span class="item-num">02</span>
                <span>BREAKING THINGS LEGALLY</span>
              </div>
              <div class="manifest-item">
                <span class="item-num">03</span>
                <span>RACING PIXELS</span>
              </div>
              <div class="manifest-item">
                <span class="item-num">04</span>
                <span>CAPTURING MACHINES</span>
              </div>
            </div>
          </div>

          <div class="col-art">
            <div class="geometry-container">
              <div class="geo-lines"></div>
              <div class="geo-square"></div>
              <div class="geo-circle"></div>
            </div>

            <div class="sys-container">
              <div class="barcode">
                <div class="bar b1"></div>
                <div class="bar b2"></div>
                <div class="bar b3"></div>
                <div class="bar b4"></div>
                <div class="bar b5"></div>
                <div class="bar b6"></div>
                <div class="bar b7"></div>
                <div class="bar b8"></div>
                <div class="bar b9"></div>
              </div>
              <div class="sys-data">
                REF_ID: IA-2024<br/>
                <span class="status-dot"></span>SYS_STATUS: ACTIVE<br/>
                MODE: STRICT
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </foreignObject>
</svg>
